name: Create Implementation Plan

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "What would you like a plan created for?"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  create-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate implementation plan
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAN_TOPIC: ${{ inputs.topic }}
        run: |
          TEMPLATE=$(cat prompts/new-plan-template.prompt.md)

          PAYLOAD=$(node -e "
            const topic = process.env.PLAN_TOPIC;
            const template = process.env.TEMPLATE || '';
            const body = {
              model: 'openai/gpt-4o',
              messages: [
                {
                  role: 'system',
                  content: 'You are a technical planning assistant. Your job is to create detailed, structured multi-phase implementation plans. Always output only the final plan in markdown — no preamble, no commentary, just the plan document. The plan file must end with a level-1 heading and follow the template structure exactly.'
                },
                {
                  role: 'user',
                  content: 'Using the template and guidelines below, create a complete implementation plan for the following topic:\\n\\nTOPIC: ' + topic + '\\n\\n---\\n\\n' + template
                }
              ],
              temperature: 0.3,
              max_tokens: 4096
            };
            console.log(JSON.stringify(body));
          " | TEMPLATE="$TEMPLATE")

          RESPONSE=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "https://models.inference.ai.azure.com/chat/completions" \
            -d "$PAYLOAD")

          PLAN=$(echo "$RESPONSE" | node -e "
            let data = '';
            process.stdin.on('data', chunk => data += chunk);
            process.stdin.on('end', () => {
              try {
                const json = JSON.parse(data);
                process.stdout.write(json.choices[0].message.content);
              } catch (e) {
                process.stderr.write('Failed to parse response: ' + data + '\n');
                process.exit(1);
              }
            });
          ")

          SLUG=$(echo "$PLAN_TOPIC" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\{2,\}/-/g' | sed 's/^-\|-$//g')
          FILENAME="plans/${SLUG}.prompt.md"

          echo "$PLAN" > "$FILENAME"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Create pull request with generated plan
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: plans/
          commit-message: "feat(plans): add implementation plan for ${{ inputs.topic }}"
          branch: "plan/${{ steps.generate.outputs.slug }}-${{ github.run_id }}"
          title: "plan: ${{ inputs.topic }}"
          body: |
            ## 🤖 Generated Implementation Plan

            This plan was generated by GitHub Copilot for the following topic:

            > **${{ inputs.topic }}**

            The plan follows the structured multi-phase format defined in [`prompts/new-plan-template.prompt.md`](../prompts/new-plan-template.prompt.md) and is ready to be executed by the `plan-coordinator` agent.

            ### Next Steps

            1. Review the generated plan in [`${{ steps.generate.outputs.filename }}`](../${{ steps.generate.outputs.filename }})
            2. Adjust phases, constraints, or success criteria as needed
            3. Merge this PR to store the plan in `plans/`
            4. Invoke the plan coordinator:
               > *"Using the plan-coordinator agent, execute the implementation plan in `.github/${{ steps.generate.outputs.filename }}`"*

            ---
            *Triggered by `@${{ github.actor }}` via the **Create Implementation Plan** workflow.*

name: Execute Implementation Plan

on:
  workflow_dispatch:
    inputs:
      plan_file:
        description: "Path to plan file in .github/plans/ (e.g., add-pause-resume-command.md)"
        required: true
        default: "add-pause-resume-command.md"
      run_coordinator:
        description: "Invoke plan-coordinator agent to execute plan?"
        required: false
        type: boolean
        default: true

jobs:
  validate-and-prepare:
    name: Validate Plan & Prepare Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate plan file exists
        run: |
          PLAN_FILE=".github/plans/${{ inputs.plan_file }}"
          if [ ! -f "$PLAN_FILE" ]; then
            echo "❌ Plan file not found: $PLAN_FILE"
            exit 1
          fi
          echo "✅ Plan file found: $PLAN_FILE"

      - name: Display plan
        run: |
          echo "📋 Implementation Plan:"
          echo "======================"
          cat ".github/plans/${{ inputs.plan_file }}"
          echo ""
          echo "Note: This plan will be executed using the plan-coordinator agent."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Validate compilation
        run: npm run compile
        continue-on-error: true

      - name: Run existing tests
        run: npm test 2>/dev/null || echo "No tests found or tests skipped"
        continue-on-error: true

  execution-guide:
    name: Plan Execution Instructions
    runs-on: ubuntu-latest
    needs: validate-and-prepare
    steps:
      - name: Display execution instructions
        run: |
          echo "🚀 Plan Coordinator Execution Guide"
          echo "===================================="
          echo ""
          echo "Your plan '${{ inputs.plan_file }}' is ready for execution."
          echo ""
          echo "To execute this plan using the plan-coordinator agent:"
          echo ""
          echo "1. Open GitHub Copilot Chat in VS Code"
          echo "2. Run this command:"
          echo ""
          echo "   /plan-coordinator"
          echo ""
          echo "   Then provide the plan from .github/plans/${{ inputs.plan_file }}"
          echo ""
          echo "3. The plan-coordinator will:"
          echo "   - Parse the plan into phases"
          echo "   - Dispatch phase-mentor agents to define requirements"
          echo "   - Dispatch phase-worker agents to implement"
          echo "   - Validate results against success criteria"
          echo "   - Update documentation on completion"
          echo ""
          echo "4. Each phase will follow:"
          echo "   ✓ Phase Mentor creates Requirements Brief"
          echo "   ✓ Phase Worker implements iteratively"
          echo "   ✓ Phase Worker runs tests and validates"
          echo "   ✓ Phase Mentor reviews and approves/rejects"
          echo "   ✓ If approved: move to next phase"
          echo "   ✓ If rejected: worker returns for rework"
          echo ""
          echo "Expected Workflow:"
          echo "  Plan → Parse → Mentor 1 → Worker 1 → Validate"
          echo "           ↓"
          echo "         Mentor 2 → Worker 2 → Validate"
          echo "           ↓"
          echo "         Mentor 3 → Worker 3 → Validate"
          echo "           ↓"
          echo "         Update Documentation → Complete"
          echo ""
          echo "Success Criteria:"
          echo "  • All phases complete"
          echo "  • All tests passing"
          echo "  • Code compiles cleanly"
          echo "  • Documentation updated"
          echo "  • No breaking changes"
          echo ""

  plan-coordinator-trigger:
    name: Ready for Plan Coordinator
    runs-on: ubuntu-latest
    needs: [validate-and-prepare, execution-guide]
    if: ${{ inputs.run_coordinator }}
    steps:
      - name: Plan is ready
        run: |
          echo "✅ Plan validation complete"
          echo ""
          echo "To execute this plan:"
          echo "1. Use the plan-coordinator agent in GitHub Copilot Chat"
          echo "2. Provide the plan from: .github/plans/${{ inputs.plan_file }}"
          echo ""
          echo "The plan-coordinator will dispatch mentor/worker pairs"
          echo "and manage the full implementation workflow."
          echo ""
          echo "💡 Tip: You can view plan execution progress in:"
          echo "   - GitHub Copilot Chat (in VS Code)"
          echo "   - This workflow run log (for reference)"

  results-tracking:
    name: Prepare Results Tracking
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create artifacts directory
        run: mkdir -p plan-results

      - name: Document plan execution
        run: |
          cat > plan-results/execution-log.md << 'EOF'
          # Plan Execution Log

          **Plan:** ${{ inputs.plan_file }}
          **Started:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Execution Status

          - [ ] Plan Validation: ✅ Complete
          - [ ] Phase 1 (Mentor/Worker): ⏳ Awaiting plan-coordinator
          - [ ] Phase 2 (Mentor/Worker): ⏳ Awaiting Phase 1
          - [ ] Phase 3 (Mentor/Worker): ⏳ Awaiting Phase 2
          - [ ] Documentation Updates: ⏳ Awaiting all phases
          - [ ] Final Validation: ⏳ Pending

          ## Phase Results

          ### Phase 1
          - Status: [To be updated]
          - Mentor: [Awaiting dispatch]
          - Worker: [Awaiting mentor brief]
          - Validation: [Pending]

          ### Phase 2
          - Status: [To be updated]
          - Mentor: [Awaiting dispatch]
          - Worker: [Awaiting mentor brief]
          - Validation: [Pending]

          ### Phase 3
          - Status: [To be updated]
          - Mentor: [Awaiting dispatch]
          - Worker: [Awaiting mentor brief]
          - Validation: [Pending]

          ## Notes

          Update this log as plan-coordinator executes each phase.
          Results will be tracked in this workflow and in the plan-coordinator agent output.
          EOF
          cat plan-results/execution-log.md

      - name: Upload plan and tracking
        uses: actions/upload-artifact@v3
        with:
          name: plan-execution-tracking
          path: plan-results/
          retention-days: 30
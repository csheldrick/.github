name: Generate Implementation Plan
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Generate plan {0}', inputs.plan_name != '' && inputs.plan_name || 'generated-plan') || format('Generate plan comment-{0}', github.run_number) }}

on:
  workflow_dispatch:
    inputs:
      user_request:
        description: "Natural-language request to convert into an implementation plan"
        required: true
      plan_name:
        description: "Optional output filename (without extension). Auto-generated when empty."
        required: false
        default: ""
      superpowers_repo:
        description: "Forked superpowers repository in owner/repo format"
        required: true
        default: "csheldrick/superpowers"
      superpowers_ref:
        description: "Branch, tag, or SHA from the forked superpowers repository"
        required: false
        default: "main"
      superpowers_agent_path:
        description: "Path to the agent file inside the superpowers repository"
        required: false
        default: "agents/using-superpowers.agent.md"
      model:
        description: "GitHub Models identifier"
        required: false
        default: "claude-opus-4-6"
      commit_plan:
        description: "Commit generated plan to the triggering branch"
        required: false
        type: boolean
        default: true

  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  generate:
    name: Generate Plan File
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/plan '))

    steps:
      - name: Check actor permission
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            if (!['admin', 'maintain', 'write'].includes(perm.permission)) {
              core.setFailed(`${context.actor} does not have sufficient permission to trigger plan generation (requires write, maintain, or admin)`);
            }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve request and filename
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          INPUT_USER_REQUEST: ${{ inputs.user_request || '' }}
          INPUT_PLAN_NAME: ${{ inputs.plan_name || '' }}
          INPUT_COMMIT_PLAN: ${{ inputs.commit_plan || 'true' }}
          INPUT_SUPERPOWERS_REPO: ${{ inputs.superpowers_repo || '' }}
          INPUT_SUPERPOWERS_REF: ${{ inputs.superpowers_ref || '' }}
          INPUT_SUPERPOWERS_AGENT_PATH: ${{ inputs.superpowers_agent_path || '' }}
          INPUT_MODEL: ${{ inputs.model || '' }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            REQUEST="$COMMENT_BODY"
            REQUEST="${REQUEST#'/plan '}"
            PLAN_NAME=""
            COMMIT_PLAN="false"
            SUPERPOWERS_REPO="${REPOSITORY_OWNER}/superpowers"
            SUPERPOWERS_REF="main"
            SUPERPOWERS_AGENT_PATH="agents/using-superpowers.agent.md"
            MODEL="openai/gpt-4.1"
          else
            REQUEST="$INPUT_USER_REQUEST"
            PLAN_NAME="$INPUT_PLAN_NAME"
            COMMIT_PLAN="$INPUT_COMMIT_PLAN"
            SUPERPOWERS_REPO="$INPUT_SUPERPOWERS_REPO"
            SUPERPOWERS_REF="$INPUT_SUPERPOWERS_REF"
            SUPERPOWERS_AGENT_PATH="$INPUT_SUPERPOWERS_AGENT_PATH"
            MODEL="$INPUT_MODEL"
          fi

          if [ -n "$PLAN_NAME" ]; then
            PLAN_NAME="$(echo "$PLAN_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/\.(prompt|promp)\.md$//' | sed -E 's/\.md$//' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g' | cut -c1-56)"
          else
            PLAN_NAME="$(echo "$REQUEST" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g' | cut -c1-56)"
          fi

          if [ -z "$PLAN_NAME" ]; then
            PLAN_NAME="generated-plan"
          fi

          DELIM="REQUEST_$(date +%s)_$RANDOM"
          {
            echo "request<<$DELIM"
            echo "$REQUEST"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"
          echo "plan_name=$PLAN_NAME" >> "$GITHUB_OUTPUT"
          echo "commit_plan=$COMMIT_PLAN" >> "$GITHUB_OUTPUT"
          echo "superpowers_repo=$SUPERPOWERS_REPO" >> "$GITHUB_OUTPUT"
          echo "superpowers_ref=$SUPERPOWERS_REF" >> "$GITHUB_OUTPUT"
          echo "superpowers_agent_path=$SUPERPOWERS_AGENT_PATH" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Checkout forked superpowers repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve.outputs.superpowers_repo }}
          ref: ${{ steps.resolve.outputs.superpowers_ref }}
          path: superpowers

      - name: Import superpowers agents
        id: import_agents
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "superpowers/agents" ]; then
            cp superpowers/agents/*.agent.md .github/agents/ 2>/dev/null || true
            echo "Imported agents from superpowers/agents/ to .github/agents/"
          fi
          AGENT_NAME="$(basename "${{ steps.resolve.outputs.superpowers_agent_path }}" .agent.md)"
          echo "agent_name=$AGENT_NAME" >> "$GITHUB_OUTPUT"

      - name: Build generation prompt
        id: prompt
        shell: bash
        run: |
          set -euo pipefail

          AGENT_FILE="superpowers/${{ steps.resolve.outputs.superpowers_agent_path }}"
          TEMPLATE_FILE=".github/prompts/new-plan-template.prompt.md"

          HAS_AGENT="true"
          if [ ! -f "$AGENT_FILE" ]; then
            HAS_AGENT="false"
            echo "Warning: superpowers agent file not found: $AGENT_FILE"
            echo "Continuing with template-only prompt."
          fi

          {
            echo "You are generating an implementation plan markdown file for this repository."
            echo "Use the AGENT INSTRUCTIONS and TEMPLATE PATTERN below."
            echo "Keep the output practical and directly executable."
            echo ""
            echo "USER REQUEST:"
            echo "${{ steps.resolve.outputs.request }}"
            echo ""
            echo "REPOSITORY CONTEXT:"
            echo "- Project: AutoKeep Copilot VS Code extension"
            echo "- Primary files: src/extension.ts, package.json, tsconfig.json, README.md"
            echo "- Build check: npm run compile"
            echo ""
            echo "AGENT INSTRUCTIONS:"
            if [ "$HAS_AGENT" = "true" ]; then
              cat "$AGENT_FILE"
            else
              echo "(Unavailable: using template-only planning mode.)"
            fi
            echo ""
            echo "PLAN TEMPLATE REFERENCE:"
            cat "$TEMPLATE_FILE"
            echo ""
            echo "OUTPUT REQUIREMENTS:"
            echo "- Return markdown only (no code fences)."
            echo "- Include objective, phased tasks, constraints, dependencies, and measurable success criteria."
            echo "- Keep phase goals concrete for implementation in this repository."
            echo "- Include a final validation phase with compile and packaging checks."
          } > "$RUNNER_TEMP/generation-prompt.txt"

          echo "agent_file=$AGENT_FILE" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Copilot CLI
        run: npm install -g @github/copilot@1

      - name: Generate plan via Copilot CLI
        id: generate
        shell: bash
        env:
          # COPILOT_GITHUB_TOKEN must be a fine-grained PAT with the "Copilot Requests" permission,
          # stored as the GH_COPILOT_TOKEN repository secret.
          # See: https://docs.github.com/en/copilot/how-tos/copilot-cli/automate-copilot-cli/automate-with-actions
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_COPILOT_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p .github/plans
          PLAN_FILE=".github/plans/${{ steps.resolve.outputs.plan_name }}.prompt.md"
          FULL_PROMPT_FILE="$RUNNER_TEMP/full-generation-prompt.txt"

          cat "$RUNNER_TEMP/generation-prompt.txt" > "$FULL_PROMPT_FILE"
          echo "" >> "$FULL_PROMPT_FILE"
          echo "Write the generated implementation plan as a markdown file to: $PLAN_FILE" >> "$FULL_PROMPT_FILE"

          if ! copilot -p "$(cat "$FULL_PROMPT_FILE")" \
            --agent="${{ steps.import_agents.outputs.agent_name }}" \
            --allow-all \
            --no-ask-user; then
            echo "Copilot CLI failed to generate plan"
            exit 1
          fi

          if [ ! -s "$PLAN_FILE" ]; then
            echo "Generated plan is empty; Copilot CLI did not write the expected file"
            exit 1
          fi

          echo "plan_file=$PLAN_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload generated plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-plan-${{ steps.resolve.outputs.plan_name }}
          path: ${{ steps.generate.outputs.plan_file }}
          retention-days: 14

      - name: Commit generated plan
        if: ${{ github.event_name == 'workflow_dispatch' && steps.resolve.outputs.commit_plan == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ steps.generate.outputs.plan_file }}"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(plans): generate ${{ steps.resolve.outputs.plan_name }}"
          git push

      - name: Comment on issue with plan details
        if: ${{ github.event_name == 'issue_comment' }}
        uses: actions/github-script@v7
        env:
          PLAN_REQUEST: ${{ steps.resolve.outputs.request }}
          PLAN_FILE: ${{ steps.generate.outputs.plan_file }}
          AGENT_SOURCE: ${{ steps.prompt.outputs.agent_file }}
        with:
          script: |
            const body = [
              "Plan generation complete.",
              "",
              `- Request: ${process.env.PLAN_REQUEST}`,
              `- Plan file: ${process.env.PLAN_FILE}`,
              `- Agent source: ${process.env.AGENT_SOURCE}`,
              "",
              "Download the generated plan from the workflow artifacts."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

name: Implement Plan From Library
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Implement plan {0}', inputs.plan_file) || format('Implement plan comment-{0}', github.run_number) }}

on:
  workflow_dispatch:
    inputs:
      plan_file:
        description: "Plan filename in .github/plans (for example: my-plan.prompt.md)"
        required: true
      superpowers_repo:
        description: "Forked superpowers repository in owner/repo format"
        required: true
        default: "csheldrick/superpowers"
      superpowers_ref:
        description: "Branch, tag, or SHA from the forked superpowers repository"
        required: false
        default: "main"
      superpowers_agent_path:
        description: "Path to the agent file inside the superpowers repository"
        required: false
        default: "agents/using-superpowers.agent.md"
      model:
        description: "GitHub Models identifier"
        required: false
        default: "claude-opus-4-6"
      commit_changes:
        description: "Commit and push applied changes"
        required: true
        type: boolean
        default: true
      create_pr:
        description: "Create a pull request after committing changes"
        required: true
        type: boolean
        default: true

  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    name: Implement Selected Plan
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/implement-plan '))

    steps:
      - name: Check actor permission
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            if (!['admin', 'maintain', 'write'].includes(perm.permission)) {
              core.setFailed(`${context.actor} does not have sufficient permission to trigger plan implementation (requires write, maintain, or admin)`);
            }

      - name: Validate Token
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || '' }}
        run: |
          if [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "Error: GITHUB_TOKEN must be set in secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve execution inputs
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          INPUT_PLAN_FILE: ${{ inputs.plan_file || '' }}
          INPUT_COMMIT_CHANGES: ${{ inputs.commit_changes || 'true' }}
          INPUT_CREATE_PR: ${{ inputs.create_pr || 'true' }}
          INPUT_SUPERPOWERS_REPO: ${{ inputs.superpowers_repo || '' }}
          INPUT_SUPERPOWERS_REF: ${{ inputs.superpowers_ref || '' }}
          INPUT_SUPERPOWERS_AGENT_PATH: ${{ inputs.superpowers_agent_path || '' }}
          INPUT_MODEL: ${{ inputs.model || '' }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            BODY="$COMMENT_BODY"
            PLAN_FILE="${BODY#'/implement-plan '}"
            COMMIT_CHANGES="false"
            CREATE_PR="false"
            SUPERPOWERS_REPO="${REPOSITORY_OWNER}/superpowers"
            SUPERPOWERS_REF="main"
            SUPERPOWERS_AGENT_PATH="agents/using-superpowers.agent.md"
            MODEL="openai/gpt-4.1"
          else
            PLAN_FILE="$INPUT_PLAN_FILE"
            COMMIT_CHANGES="$INPUT_COMMIT_CHANGES"
            CREATE_PR="$INPUT_CREATE_PR"
            SUPERPOWERS_REPO="$INPUT_SUPERPOWERS_REPO"
            SUPERPOWERS_REF="$INPUT_SUPERPOWERS_REF"
            SUPERPOWERS_AGENT_PATH="$INPUT_SUPERPOWERS_AGENT_PATH"
            MODEL="$INPUT_MODEL"
          fi

          RAW_PLAN_INPUT="$PLAN_FILE"
          PLAN_FILE="$(echo "$RAW_PLAN_INPUT" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          PLAN_FILE="${PLAN_FILE#./}"
          PLAN_FILE="${PLAN_FILE#'.github/plans/'}"

          if ! [[ "$PLAN_FILE" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid plan file input: $RAW_PLAN_INPUT"
            echo "Use a filename like feature-plan, feature-plan.prompt.md, or feature-plan.md"
            exit 1
          fi

          PLAN_STEM="$(echo "$PLAN_FILE" | sed -E 's/\.(prompt|promp)\.md$//' | sed -E 's/\.md$//')"
          if [ -z "$PLAN_STEM" ]; then
            echo "Invalid plan file input: $RAW_PLAN_INPUT"
            exit 1
          fi

          CANDIDATES=("$PLAN_FILE" "${PLAN_STEM}.prompt.md" "${PLAN_STEM}.md" "${PLAN_STEM}.promp.md")
          RESOLVED_PLAN_FILE=""
          ATTEMPTED=""
          for candidate in "${CANDIDATES[@]}"; do
            if [[ " $ATTEMPTED " == *" $candidate "* ]]; then
              continue
            fi

            ATTEMPTED="$ATTEMPTED $candidate"
            if [ -f ".github/plans/$candidate" ]; then
              RESOLVED_PLAN_FILE="$candidate"
              break
            fi
          done

          if [ -z "$RESOLVED_PLAN_FILE" ]; then
            echo "Plan file not found in .github/plans."
            echo "Input: $RAW_PLAN_INPUT"
            echo "Tried: $(echo "$ATTEMPTED" | sed -E 's/^[[:space:]]+//')"
            exit 1
          fi

          PLAN_FILE="$RESOLVED_PLAN_FILE"

          PLAN_SLUG="$(echo "$PLAN_FILE" | sed -E 's/\.prompt\.md$//' | sed -E 's/\.md$//' | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g' | cut -c1-40)"
          if [ -z "$PLAN_SLUG" ]; then
            PLAN_SLUG="plan"
          fi

          PR_BRANCH="plan-implementation/${PLAN_SLUG}-${{ github.run_number }}"
          BASE_BRANCH="${GITHUB_REF_NAME:-main}"

          PLAN_PATH=".github/plans/$PLAN_FILE"

          echo "plan_file=$PLAN_FILE" >> "$GITHUB_OUTPUT"
          echo "plan_path=$PLAN_PATH" >> "$GITHUB_OUTPUT"
          echo "commit_changes=$COMMIT_CHANGES" >> "$GITHUB_OUTPUT"
          echo "create_pr=$CREATE_PR" >> "$GITHUB_OUTPUT"
          echo "superpowers_repo=$SUPERPOWERS_REPO" >> "$GITHUB_OUTPUT"
          echo "superpowers_ref=$SUPERPOWERS_REF" >> "$GITHUB_OUTPUT"
          echo "superpowers_agent_path=$SUPERPOWERS_AGENT_PATH" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "pr_branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout forked superpowers repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve.outputs.superpowers_repo }}
          ref: ${{ steps.resolve.outputs.superpowers_ref }}
          path: superpowers

      - name: Build implementation prompt package
        id: prompt
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p implementation-output

          AGENT_FILE="superpowers/${{ steps.resolve.outputs.superpowers_agent_path }}"
          HAS_AGENT="true"
          if [ ! -f "$AGENT_FILE" ]; then
            HAS_AGENT="false"
            echo "Warning: superpowers agent file not found: $AGENT_FILE"
            echo "Continuing without superpowers agent instructions."
          fi

          {
            echo "You are implementing a plan in this repository."
            echo "Use AGENT INSTRUCTIONS and PLAN to make the required code changes directly."
            echo ""
            echo "REPOSITORY CONTEXT:"
            echo "- Project: AutoKeep Copilot VS Code extension"
            echo "- Allowed implementation files: src/**, README.md, package.json, tsconfig.json, .github/workflows/**"
            echo "- Validation commands: npm run compile"
            echo ""
            echo "AGENT INSTRUCTIONS:"
            if [ "$HAS_AGENT" = "true" ]; then
              cat "$AGENT_FILE"
            else
              echo "(Unavailable: using template-only implementation mode.)"
            fi
            echo ""
            echo "SELECTED PLAN:"
            cat "${{ steps.resolve.outputs.plan_path }}"
          } > implementation-output/implementation-prompt.txt

          echo "agent_file=$AGENT_FILE" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Copilot CLI
        run: npm install -g @github/copilot@1

      - name: Invoke Copilot agent to implement plan
        id: generate
        shell: bash
        env:
          # COPILOT_GITHUB_TOKEN must be a fine-grained PAT with the "Copilot Requests" permission,
          # stored as the GH_COPILOT_TOKEN repository secret.
          # See: https://docs.github.com/en/copilot/how-tos/copilot-cli/automate-copilot-cli/automate-with-actions
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_COPILOT_TOKEN }}
        run: |
          set -euo pipefail

          if ! copilot -p "/fleet $(cat "implementation-output/implementation-prompt.txt")" \
            --agent="plan-coordinator" \
            --allow-all \
            --remote \
            --no-ask-user; then
            echo "Copilot CLI failed to implement the plan"
            exit 1
          fi

          echo "agent_ran=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Validate compilation
        run: npm run compile
        continue-on-error: true

      - name: Commit applied implementation
        if: ${{ github.event_name == 'workflow_dispatch' && (steps.resolve.outputs.commit_changes == 'true' || steps.resolve.outputs.create_pr == 'true') && steps.generate.outputs.agent_ran == 'true' }}
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Remove workflow-only artifacts that must never be committed
          rm -rf superpowers
          rm -rf implementation-output

          # Restore .github/agents/ to its committed state in case the agent
          # copied files there from the superpowers repo during execution
          git checkout HEAD -- .github/agents/ 2>/dev/null || true
          git clean -fd -- .github/agents/ 2>/dev/null || true

          git add -A

          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.resolve.outputs.create_pr }}" = "true" ]; then
            git switch -c "${{ steps.resolve.outputs.pr_branch }}"
          fi

          git commit -m "chore(plans): implement ${{ steps.resolve.outputs.plan_file }}"

          if [ "${{ steps.resolve.outputs.create_pr }}" = "true" ]; then
            git push --set-upstream origin "${{ steps.resolve.outputs.pr_branch }}"
          else
            git push
          fi

          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: ${{ github.event_name == 'workflow_dispatch' && steps.resolve.outputs.create_pr == 'true' && steps.commit.outputs.committed == 'true' && steps.generate.outputs.agent_ran == 'true' }}
        id: pr
        uses: actions/github-script@v7
        env:
          PLAN_FILE: ${{ steps.resolve.outputs.plan_file }}
          PLAN_PATH: ${{ steps.resolve.outputs.plan_path }}
          AGENT_SOURCE: ${{ steps.prompt.outputs.agent_file }}
          PR_BRANCH: ${{ steps.resolve.outputs.pr_branch }}
          BASE_BRANCH: ${{ steps.resolve.outputs.base_branch }}
        with:
          # GH_PAT must be a fine-grained or classic PAT with pull-requests: write on this repo.
          # If GH_PAT is not set, falls back to GITHUB_TOKEN which requires
          # Settings > Actions > General > "Allow GitHub Actions to create and approve pull requests"
          # to be enabled in the repository.
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const title = `Implement plan: ${process.env.PLAN_FILE}`;
            const body = [
              `Implements the selected plan from ${process.env.PLAN_PATH}.`,
              '',
              `- Agent source: ${process.env.AGENT_SOURCE}`,
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Artifacts for the implementation prompt are attached to the workflow run.'
            ].join('\n');

            const response = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              head: process.env.PR_BRANCH,
              base: process.env.BASE_BRANCH,
              body
            });

            core.setOutput('pr_url', response.data.html_url);

      - name: Write run summary
        shell: bash
        run: |
          {
            echo "## Plan Implementation Run"
            echo ""
            echo "- Selected plan: ${{ steps.resolve.outputs.plan_path }}"
            echo "- Agent source: ${{ steps.prompt.outputs.agent_file }}"
            echo "- Agent ran: ${{ steps.generate.outputs.agent_ran }}"
            echo "- Commit mode: ${{ steps.resolve.outputs.commit_changes }}"
            echo "- PR mode: ${{ steps.resolve.outputs.create_pr }}"
            echo "- PR branch: ${{ steps.resolve.outputs.pr_branch }}"
            echo "- PR URL: ${{ steps.pr.outputs.pr_url }}"
            echo ""
            echo "Artifacts include the implementation prompt used."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload implementation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plan-implementation-${{ steps.resolve.outputs.plan_file }}
          path: implementation-output/
          retention-days: 14

      - name: Comment on issue with implementation status
        if: ${{ github.event_name == 'issue_comment' }}
        uses: actions/github-script@v7
        env:
          PLAN_PATH: ${{ steps.resolve.outputs.plan_path }}
          AGENT_RAN: ${{ steps.generate.outputs.agent_ran }}
          AGENT_SOURCE: ${{ steps.prompt.outputs.agent_file }}
        with:
          script: |
            const body = [
              "Plan implementation run complete.",
              "",
              `- Selected plan: ${process.env.PLAN_PATH}`,
              `- Agent source: ${process.env.AGENT_SOURCE}`,
              `- Agent ran: ${process.env.AGENT_RAN}`,
              "",
              "Review the workflow artifacts for the implementation prompt details."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
